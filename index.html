<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d0d0d">
  <title>Flip Clock</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">

    <!-- Mode navigation -->
    <nav id="mode-nav">
      <button class="mode-btn active" data-mode="clock">CLOCK</button>
      <button class="mode-btn" data-mode="timer">TIMER</button>
      <button class="mode-btn" data-mode="pomodoro">POMODORO</button>
    </nav>

    <!-- Main display area -->
    <div id="display-area">
      <div id="session-label" aria-live="polite"></div>
      <div id="flip-display" role="timer" aria-label="Time display"></div>
      <div id="pomodoro-progress" class="hidden">
        <div id="cycle-dots"></div>
      </div>
    </div>

    <!-- Timer / Pomodoro controls -->
    <div id="timer-controls" class="mode-controls hidden">
      <button id="btn-timer-startstop" class="ctrl-btn primary">START</button>
      <button id="btn-timer-reset" class="ctrl-btn secondary">RESET</button>
    </div>

    <div id="pomodoro-controls" class="mode-controls hidden">
      <button id="btn-pomo-startstop" class="ctrl-btn primary">START</button>
      <button id="btn-pomo-skip" class="ctrl-btn secondary">SKIP</button>
      <button id="btn-pomo-reset" class="ctrl-btn secondary">RESET</button>
    </div>

    <!-- Settings bar -->
    <div id="settings-bar">
      <button id="btn-fullscreen" class="icon-btn" title="Fullscreen" aria-label="Toggle fullscreen">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/>
        </svg>
      </button>
      <button id="btn-sound" class="icon-btn active" title="Toggle sound" aria-label="Toggle sound">
        <svg id="sound-icon-on" width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/>
        </svg>
        <svg id="sound-icon-off" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" class="hidden">
          <path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/>
        </svg>
      </button>
      <button id="btn-seconds" class="icon-btn active" title="Toggle seconds" aria-label="Toggle seconds display">
        <span>:SS</span>
      </button>
      <button id="btn-settings" class="icon-btn" title="Settings" aria-label="Open settings">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
          <path d="M19.14,12.94c0.04-0.3,0.06-0.61,0.06-0.94c0-0.32-0.02-0.64-0.07-0.94l2.03-1.58c0.18-0.14,0.23-0.41,0.12-0.61 l-1.92-3.32c-0.12-0.22-0.37-0.29-0.59-0.22l-2.39,0.96c-0.5-0.38-1.03-0.7-1.62-0.94L14.4,2.81c-0.04-0.24-0.24-0.41-0.48-0.41 h-3.84c-0.24,0-0.43,0.17-0.47,0.41L9.25,5.35C8.66,5.59,8.12,5.92,7.63,6.29L5.24,5.33c-0.22-0.08-0.47,0-0.59,0.22L2.74,8.87 C2.62,9.08,2.66,9.34,2.86,9.48l2.03,1.58C4.84,11.36,4.8,11.69,4.8,12s0.02,0.64,0.07,0.94l-2.03,1.58 c-0.18,0.14-0.23,0.41-0.12,0.61l1.92,3.32c0.12,0.22,0.37,0.29,0.59,0.22l2.39-0.96c0.5,0.38,1.03,0.7,1.62,0.94l0.36,2.54 c0.05,0.24,0.24,0.41,0.48,0.41h3.84c0.24,0,0.44-0.17,0.47-0.41l0.36-2.54c0.59-0.24,1.13-0.56,1.62-0.94l2.39,0.96 c0.22,0.08,0.47,0,0.59-0.22l1.92-3.32c0.12-0.22,0.07-0.47-0.12-0.61L19.14,12.94z M12,15.6c-1.98,0-3.6-1.62-3.6-3.6 s1.62-3.6,3.6-3.6s3.6,1.62,3.6,3.6S13.98,15.6,12,15.6z"/>
        </svg>
      </button>
    </div>

    <!-- Settings panel (slide-up overlay) -->
    <div id="settings-panel" class="hidden" role="dialog" aria-label="Settings">
      <div id="settings-content">
        <div class="settings-header">
          <h2>SETTINGS</h2>
          <button id="btn-close-settings" class="icon-btn" aria-label="Close settings">✕</button>
        </div>

        <div class="settings-section" id="timer-settings">
          <h3>TIMER DURATION</h3>
          <div class="time-picker">
            <div class="time-field">
              <input type="number" id="inp-timer-min" min="0" max="99" value="5" aria-label="Minutes">
              <label>MIN</label>
            </div>
            <div class="time-sep">:</div>
            <div class="time-field">
              <input type="number" id="inp-timer-sec" min="0" max="59" value="0" aria-label="Seconds">
              <label>SEC</label>
            </div>
          </div>
        </div>

        <div class="settings-section" id="pomodoro-settings">
          <h3>POMODORO</h3>
          <div class="pomo-grid">
            <div class="pomo-field">
              <input type="number" id="inp-pomo-work" min="1" max="99" value="25">
              <label>WORK (MIN)</label>
            </div>
            <div class="pomo-field">
              <input type="number" id="inp-pomo-short" min="1" max="30" value="5">
              <label>SHORT BREAK</label>
            </div>
            <div class="pomo-field">
              <input type="number" id="inp-pomo-long" min="1" max="60" value="15">
              <label>LONG BREAK</label>
            </div>
            <div class="pomo-field">
              <input type="number" id="inp-pomo-cycles" min="2" max="10" value="4">
              <label>CYCLES</label>
            </div>
          </div>
        </div>

        <button id="btn-apply-settings" class="ctrl-btn primary full-width">APPLY</button>
      </div>
    </div>

  </div><!-- #app -->

  <script src="script.js"></script>
</body>
</html>
